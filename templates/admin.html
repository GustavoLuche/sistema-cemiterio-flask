{% extends "base.html" %}

{% block content %}
<div class="admin-container">
    <h2>Painel Administrativo</h2>
    <p class="notice">⚠️ <strong>Futuro:</strong> Esta página ainda não tem autenticação implementada (será adicionada na próxima fase)</p>
    
    <div class="admin-section">
        <h3>Adicionar Novo Registro</h3>
        <form id="addForm">
            <div class="form-group">
                <label for="nomeInput">Nome do Falecido *</label>
                <input type="text" id="nomeInput" placeholder="Nome completo" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="setorInput">Setor *</label>
                    <input type="text" id="setorInput" placeholder="Ex: A" required>
                </div>
                <div class="form-group">
                    <label for="quadraInput">Quadra *</label>
                    <input type="text" id="quadraInput" placeholder="Ex: 1" required>
                </div>
                <div class="form-group">
                    <label for="jazigoInput">Jazigo *</label>
                    <input type="text" id="jazigoInput" placeholder="Ex: 45" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="dataInput">Data de Falecimento</label>
                <input type="date" id="dataInput">
            </div>
            
            <div class="form-group">
                <label for="observacoesInput">Observações</label>
                <textarea id="observacoesInput" placeholder="Informações adicionais..." rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Adicionar Registro</button>
        </form>
    </div>

    <div class="admin-section">
        <h3>Registros Existentes</h3>
        <button id="carregarBtn" class="btn btn-secondary">Carregar Registros</button>
        <div id="registrosList"></div>
    </div>

    <div id="message" class="message-container"></div>
</div>

<script>
// Adicionar novo registro
document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
        nome_falecido: document.getElementById('nomeInput').value,
        setor: document.getElementById('setorInput').value,
        quadra: document.getElementById('quadraInput').value,
        jazigo: document.getElementById('jazigoInput').value,
        data_falecimento: document.getElementById('dataInput').value || null,
        observacoes: document.getElementById('observacoesInput').value
    };
    
    try {
        const response = await fetch('/api/admin/adicionar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        const msgDiv = document.getElementById('message');
        
        if (response.ok) {
            msgDiv.innerHTML = '<p class="success">' + result.mensagem + '</p>';
            document.getElementById('addForm').reset();
            document.getElementById('nomeInput').focus();
        } else {
            msgDiv.innerHTML = '<p class="error">' + (result.erro || 'Erro ao adicionar') + '</p>';
        }
    } catch (error) {
        document.getElementById('message').innerHTML = '<p class="error">Erro: ' + error.message + '</p>';
    }
});

// Carregar registros
document.getElementById('carregarBtn').addEventListener('click', async () => {
    try {
        const response = await fetch('/api/admin/registros');
        const data = await response.json();
        
        let html = `<p><strong>Total de registros: ${data.total}</strong></p>`;
        
        if (data.registros && data.registros.length > 0) {
            html += '<table class="registros-table"><thead><tr>' +
                    '<th>Nome</th><th>Setor</th><th>Quadra</th><th>Jazigo</th>' +
                    '</tr></thead><tbody>';
            
            data.registros.forEach(reg => {
                html += `<tr>
                    <td>${reg.nome}</td>
                    <td>${reg.setor}</td>
                    <td>${reg.quadra}</td>
                    <td>${reg.jazigo}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
        }
        
        document.getElementById('registrosList').innerHTML = html;
    } catch (error) {
        document.getElementById('message').innerHTML = '<p class="error">Erro ao carregar: ' + error.message + '</p>';
    }
});
</script>
{% endblock %}
